<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Designing</title>

<link rel="stylesheet" href="css/style.css">

<style>
body{
    margin:0;
    font-family: Arial, Helvetica, sans-serif;
    background:black;
    color:white;
}

header{
    text-align:center;
    padding:40px;
    font-size:35px;
    font-weight:bold;
}

.projects{
    display:flex;
    justify-content:center;
    gap:30px;
    flex-wrap:wrap;
    padding:40px;
}

.project-card{
    width:250px;
    height:150px;
    background:#111;
    border-radius:15px;
    display:flex;
    align-items:center;
    justify-content:center;
    text-decoration:none;
    color:white;
    font-size:20px;
    border:1px solid #333;
    transition:0.3s;
}

.project-card:hover{
    transform:scale(1.05);
    background:#1a1a1a;
}
</style>

</head>
<body>

<header>
WEB Designing
</header>

<div class="projects">

<a href="index.html" target="_blank" class="project-card">
Himalayan-Jerseys
</a>

<a href="project2.html" class="project-card">
Project 2
</a>

</div>
<h1  align="center">“Fresh projects arriving soon — don’t miss out!”</h1>

</body>
</html>
